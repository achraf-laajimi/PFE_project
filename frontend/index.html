<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassQuiz Chatbot</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- Background elements -->
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    
    <div class="character char1">😊</div>
    <div class="character char2">📚</div>
    <div class="character char3">✨</div>

    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-left">
                <div class="bot-avatar">🤖</div>
                <div class="bot-info">
                    <h2>مساعد ClassQuiz</h2>
                    <div class="bot-status">
                        <div class="status-dot"></div>
                        <span>متصل الآن</span>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <button class="header-btn" onclick="toggleMenu()">⋮</button>
            </div>
        </div>

        <!-- Messages Area -->
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="message-bubble">
                        مرحباً! 👋 أنا مساعدك الذكي في ClassQuiz. كيف يمكنني مساعدتك اليوم؟
                    </div>
                    <div class="message-time">10:30 ص</div>
                </div>
            </div>

            <div class="message bot">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="message-bubble">
                        يمكنني مساعدتك في:
                        <div class="quick-replies">
                            <button class="quick-reply-btn" onclick="sendQuickReply('امتحانات')">📝 الامتحانات</button>
                            <button class="quick-reply-btn" onclick="sendQuickReply('المواد الدراسية')">📚 المواد الدراسية</button>
                            <button class="quick-reply-btn" onclick="sendQuickReply('نصائح الدراسة')">💡 نصائح الدراسة</button>
                            <button class="quick-reply-btn" onclick="sendQuickReply('الدعم الفني')">🛠️ الدعم الفني</button>
                        </div>
                    </div>
                    <div class="message-time">10:30 ص</div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-container">
            <button class="emoji-btn" onclick="insertEmoji()">😊</button>
            <input 
                type="text" 
                class="chat-input" 
                id="messageInput" 
                placeholder="اكتب رسالتك هنا..."
                onkeypress="handleKeyPress(event)"
            >
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
